- name: Ensure .kube directory exists
  ansible.builtin.file:
    path: "~/.kube"
    state: directory
    mode: "0700"

- name: Get AKS credentials block
  block:
    - name: Fetch AKS cluster details from Azure
      azure.azcollection.azure_rm_aks_info:
        resource_group: "{{ rg_name }}" # Fixed spacing and used underscore
        name: "{{ aks_name }}"
        show_kubeconfig: user
      register: aks_info

    - name: Write kubeconfig content to ~/.kube/config
      ansible.builtin.copy:
        content: "{{ aks_info.aks[0].kube_config[0] }}"
        dest: "~/.kube/config"
        mode: "0600"
